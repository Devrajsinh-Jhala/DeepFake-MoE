services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: aida
      POSTGRES_USER: aida
      POSTGRES_PASSWORD: aida_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres-data:
